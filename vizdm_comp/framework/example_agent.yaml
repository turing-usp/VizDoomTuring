name: "Alice"
colorset: 2

engine_reward:        # recompensas do ENGINE (entram de make_action)
  living_reward: 0.0
  frag_reward: 1.0
  hit_reward: 0.0
  hit_taken_reward: 0.0
  damage_made_reward: 0.05
  damage_taken_penalty: -0.05
  item_reward: 0.0
  health_reward: 0.0
  armor_reward: 0.0
  secret_reward: 0.0

shaping:              # shaping por deltas de variáveis
  w_frag: 0.0         # 0 para não contar 2x (já usamos frag_reward acima)
  w_health: 0.01
  w_armor: 0.005
  w_ammo2_cost: -0.002
  w_hits: 0.02
  w_hits_taken: -0.03
  w_deaths: -1.0
  step_penalty: -0.0005
  include_engine_reward: true

policy:
  algo: "ppo"         # ppo | a2c | dqn | external
  extractor: "cnn_default"
  policy_kwargs:
    net_arch:
      pi: [256, 128]
      vf: [256, 128]
    # Para extrator custom, use string "pkg.mod:ClassName":
    # features_extractor_class: "my_package.my_module:MyCNN"
    # features_extractor_kwargs: {features_dim: 512}
  learn_kwargs:
    n_steps: 256
    batch_size: 128
    learning_rate: 3e-4
    gamma: 0.995

model_dir: "models"
model_name: "alice_ppo.zip"
train: true
train_steps: 500000
