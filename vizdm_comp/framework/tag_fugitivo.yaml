name: "Fugitivo"
colorset: 8 # (Cor Verde)

engine_reward:
  # --- O OBJETIVO ---
  # Recompensa pequena e constante por estar vivo
  living_reward: 0.01 

  # --- PENALIDADES ---
  # Penalidade alta por ser "tocado" pelo pegador
  damage_taken_penalty: -10.0
  # Penalidade por acidentalmente "tocar" no pegador (ex: dar um soco)
  damage_made_reward: -1.0
  frag_reward: -100.0

shaping:
  w_deaths: -100.0
  # O step_penalty aqui é zero, pois já usamos o living_reward
  step_penalty: 0.0
  include_engine_reward: true # Usa as recompensas acima

policy:
  algo: "ppo"
  # ... (pode copiar a política do tag_agent.yaml) ...
  policy_kwargs: { net_arch: { pi: [128, 64], vf: [128, 64] } }
  learn_kwargs: { n_steps: 256, learning_rate: 3e-4, gamma: 0.99 }

model_dir: "models"
model_name: "fugitivo_bot.zip"
train: true
train_steps: 300000